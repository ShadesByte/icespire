name: CI

# Run on every pull request, and on pushes to main.
# This is the "robot reviewer" that verifies the site builds
# before anything can be merged and deployed.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build
